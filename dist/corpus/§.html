<h1>§</h1>
<div class="content">
<p>String-template substitution holes inside quoted literals.</p>
<p><strong>Syntax:</strong> <code>\"<template>\"(<args>...)</code></p>
<h2>Category</h2>
<p><code>format</code></p>
<h2>Related</h2>
<ul>
<li>[textus](/corpus/textus.html)</li>
<li>[scribe](/corpus/scribe.html)</li>
</ul>
<h2>Examples</h2>
<h3>examples/corpus/operatores/metadata.fab (canonical · operator-group)</h3>
<p>String-template substitution holes inside quoted literals.</p>
<pre class="faber-code"><code class="lang-faber outcome=compiles"># operatores/metadata — § string templates
#
# GRAMMAR:
#   stringTemplate :← stringLit '(' expr (',' expr)* ')'
#
# EXPECTED OUTPUT:
#   Salve, Marcus!, 1 + 2 = 3
#
# BACKEND:
#   Per-file metadata belongs in +++ frontmatter, not line-start § directives.

incipit {
    fixum _ nomen ← "Marcus"
    nota "Salve, §!"(nomen)
    nota "§ + § = §"(1, 2, 3)
}</code></pre>
<p><strong>Expected output:</strong></p>
<pre class="faber-code"><code>Salve, Marcus!
1 + 2 = 3
</code></pre>
